spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_service_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123}

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8100/realms/carsharing-realm
          jwk-set-uri: http://keycloak:8080/realms/carsharing-realm/protocol/openid-connect/certs
server:
  port: 8084
