server:
  port: 8100

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8081
              predicates:
                - Path=/user/v1/**

            - id: booking-service
              uri: http://booking-service:8082
              predicates:
                - Path=/booking/v1/**

            - id: car-service
              uri: http://car-service:8083
              predicates:
                - Path=/car/v1/**

            - id: payment-service
              uri: http://payment-service:8084
              predicates:
                - Path=payment/v1/**
