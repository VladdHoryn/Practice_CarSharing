spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:9999
              predicates:
                - Path=/user/v1/**

            - id: booking-service
              uri: http://localhost:9998
              predicates:
                - Path=/booking/v1/**

            - id: car-service
              uri: http://localhost:9997
              predicates:
                - Path=/car/v1/**

            - id: payment-service
              uri: http://localhost:9996
              predicates:
                - Path=/payment/v1/**
