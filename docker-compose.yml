version: '3.8'

services:
  # =====================================================
  # MESSAGE BROKER (RabbitMQ)
  # =====================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: car_sharing_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - car-sharing-network

  # =====================================================
  # API GATEWAY (Шлюз додатку)
  # =====================================================
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8100:8100"
    networks:
      - car-sharing-network

  # =====================================================
  # USER SERVICE with PostgreSQL
  # =====================================================
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - car-sharing-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d user_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: always
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: user_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
    ports:
      - "8081:8081"
    networks:
      - car-sharing-network

  # =====================================================
  # CAR SERVICE with PostgreSQL
  # =====================================================
  car-db:
    image: postgres:15-alpine
    container_name: car-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: car_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - car_postgres_data:/var/lib/postgresql/data
    networks:
      - car-sharing-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d car_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  car-service:
    build:
      context: ./backend/car-service
      dockerfile: Dockerfile
    container_name: car-service
    restart: always
    depends_on:
      car-db:
        condition: service_healthy
    environment:
      DB_HOST: car-db
      DB_PORT: 5432
      DB_NAME: car_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
    ports:
      - "8083:8083"
    networks:
      - car-sharing-network

  # =====================================================
  # BOOKING SERVICE with PostgreSQL
  # =====================================================
  booking-db:
    image: postgres:15-alpine
    container_name: booking-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    networks:
      - car-sharing-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d booking_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  booking-service:
    build:
      context: ./backend/booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    restart: always
    depends_on:
      booking-db:
        condition: service_healthy
    environment:
      DB_HOST: booking-db
      DB_PORT: 5432
      DB_NAME: booking_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
    ports:
      - "8082:8082"
    networks:
      - car-sharing-network

  # =====================================================
  # PAYMENT SERVICE with PostgreSQL
  # =====================================================
  payment-db:
    image: postgres:15-alpine
    container_name: payment-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5435:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    networks:
      - car-sharing-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d payment_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: always
    depends_on:
      payment-db:
        condition: service_healthy
    environment:
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_NAME: payment_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
    ports:
      - "8084:8084"
    networks:
      - car-sharing-network

  # =====================================================
  # FRONTEND (React Application)
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: car-sharing-frontend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - car-sharing-network
    depends_on:
      - api-gateway
    environment:
      - NODE_ENV=development

  # =====================================================
  # DATABASE MANAGEMENT (pgAdmin)
  # =====================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: car_sharing_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@carsharing.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - car-sharing-network
    depends_on:
      - car-db

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8090:8080"
    command:
      - start-dev


# =====================================================
# Глобальні томи (Volumes)
# =====================================================
volumes:
  user_postgres_data:
  car_postgres_data:
  booking_postgres_data:
  payment_postgres_data:

# =====================================================
# Глобальна мережа (Network)
# =====================================================
networks:
  car-sharing-network:
    driver: bridge
