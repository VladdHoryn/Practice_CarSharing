services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - car-sharing-network

#  eureka-server:
#    build:
#      context: ./eureka-server
#      dockerfile: Dockerfile
#    container_name: eureka-server
#    ports:
#      - "8761:8761"
#    networks:
#      - car-sharing-network

  # =====================================================
  # USER SERVICE with PostgreSQL
  # =====================================================
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
      - ./docker/user-db-init:/docker-entrypoint-initdb.d
    networks:
      - car-sharing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

#  user-service:
#    build:
#      context: ./user-service
#      dockerfile: Dockerfile
#    container_name: user-service
#    restart: always
#    depends_on:
#      user-db:
#        condition: service_healthy
#      eureka-server:
#        condition: service_started
#    environment:
#      DB_HOST: user-db
#      DB_PORT: 5432
#      DB_NAME: user_service_db
#      DB_USERNAME: postgres
#      DB_PASSWORD: postgres123
#    ports:
#      - "8084:8084"
#    networks:
#      - car-sharing-network

  # =====================================================
  # CAR SERVICE with PostgreSQL
  # =====================================================
  car-db:
    image: postgres:15-alpine
    container_name: car-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: car_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - car_postgres_data:/var/lib/postgresql/data
    #      - ./docker/car-db-init:/docker-entrypoint-initdb.d
    networks:
      - car-sharing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d car_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  car-service:
    build:
      context: ./backend/car-service
      dockerfile: Dockerfile
    container_name: car-service
    restart: always
    depends_on:
      car-db:
        condition: service_healthy
#      eureka-server:
#        condition: service_started
    environment:
      DB_HOST: car-db
      DB_PORT: 5432
      DB_NAME: car_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
    ports:
      - "8085:8085"
    networks:
      - car-sharing-network

  # =====================================================
  # BOOKING SERVICE with PostgreSQL
  # =====================================================
  booking-db:
    image: postgres:15-alpine
    container_name: booking-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
      - ./docker/booking-db-init:/docker-entrypoint-initdb.d
    networks:
      - car-sharing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

#  booking-service:
#    build:
#      context: ./booking-service
#      dockerfile: Dockerfile
#    container_name: booking-service
#    restart: always
#    depends_on:
#      booking-db:
#        condition: service_healthy
#      eureka-server:
#        condition: service_started
#    environment:
#      DB_HOST: booking-db
#      DB_PORT: 5432
#      DB_NAME: booking_service_db
#      DB_USERNAME: postgres
#      DB_PASSWORD: postgres123
#    ports:
#      - "8086:8086"
#    networks:
#      - car-sharing-network

  # =====================================================
  # pgAdmin for database management (optional)
  # =====================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: car_sharing_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@carsharing.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - car-sharing-network
    depends_on:
      - user-db
      - car-db
      - booking-db

# =====================================================
# Volumes
# =====================================================
volumes:
  user_postgres_data:
  car_postgres_data:
  booking_postgres_data:

# =====================================================
# Network
# =====================================================
networks:
  car-sharing-network:
    driver: bridge
