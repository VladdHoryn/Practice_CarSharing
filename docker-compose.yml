services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: car_sharing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: car_sharing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # pgAdmin (опціонально)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: car_sharing_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@carsharing.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # Backend
  backend:
    build: ./backend
    container_name: car_sharing_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: car_sharing_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
